<div class="chat-container">
  <!-- Chat Header -->
  <mat-card class="chat-header">
    <mat-card-header>
      <div mat-card-avatar class="chat-avatar">
        <mat-icon>smart_toy</mat-icon>
      </div>
      <mat-card-title>گفتگو با دستیار هوش مصنوعی</mat-card-title>
      <mat-card-subtitle>دستیار کشاورزی فارسی</mat-card-subtitle>
    </mat-card-header>
    <mat-card-actions>
      <button mat-icon-button (click)="clearChat()" matTooltip="پاک کردن گفتگو">
        <mat-icon>clear_all</mat-icon>
      </button>
    </mat-card-actions>
  </mat-card>

  <!-- Messages Container -->
  <div class="messages-container" #messagesContainer>
    <div *ngFor="let message of messages" 
         class="message-wrapper"
         [ngClass]="{'user-message': message.isUser, 'ai-message': !message.isUser}">
      
      <div class="message-bubble">
        <div class="message-content">
          {{ message.content }}
        </div>
        <div class="message-time">
          {{ formatTime(message.timestamp) }}
        </div>
      </div>
      
      <div class="message-avatar">
        <mat-icon *ngIf="message.isUser">person</mat-icon>
        <mat-icon *ngIf="!message.isUser">smart_toy</mat-icon>
      </div>
    </div>

    <!-- Loading indicator -->
    <div *ngIf="isLoading" class="message-wrapper ai-message">
      <div class="message-bubble loading-bubble">
        <mat-spinner diameter="20"></mat-spinner>
        <span>در حال تایپ...</span>
      </div>
      <div class="message-avatar">
        <mat-icon>smart_toy</mat-icon>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <mat-card class="input-area">
    <mat-form-field class="message-input-field" appearance="outline">
      <mat-label>پیام خود را بنویسید...</mat-label>
      <textarea 
        matInput 
        #messageInput
        [(ngModel)]="currentMessage"
        (keydown)="onKeyPress($event)"
        [disabled]="isLoading"
        rows="3"
        placeholder="سوال خود را در مورد کشاورزی بپرسید..."
        class="message-textarea">
      </textarea>
    </mat-form-field>
    
    <button 
      mat-fab 
      color="primary" 
      (click)="sendMessage()"
      [disabled]="!currentMessage.trim() || isLoading"
      class="send-button"
      matTooltip="ارسال پیام">
      <mat-icon>send</mat-icon>
    </button>
  </mat-card>

  <!-- Help Text -->
  <div class="help-text">
    <p>
      <mat-icon>info</mat-icon>
      می‌توانید سوالات خود را در مورد کشاورزی، باغبانی، دامداری و موضوعات مرتبط بپرسید.
    </p>
  </div>
</div>
